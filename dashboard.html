<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Dashboard | PRIMETALENT</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Montserrat', sans-serif;
  background-color: #121212;
  color: #f0f0f0;
  line-height: 1.6;
}

/* HEADER */
header {
  background: #000;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

header h1 {
  color: #d4af37;
  font-size: 1.6rem;
}

nav {
  display: flex;
  flex-wrap: wrap;
  margin-top: 0.5rem;
}

nav a {
  color: #f0f0f0;
  margin-left: 1rem;
  margin-top: 0.5rem;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
}

nav a:hover {
  color: #d4af37;
}

/* DASHBOARD */
.dashboard {
  max-width: 1100px;
  margin: 3rem auto;
  padding: 2rem;
  background: #1e1e1e;
  border-radius: 10px;
}

.dashboard h2 {
  color: #d4af37;
  margin-bottom: 1.5rem;
  font-size: 1.5rem;
}

/* TABLE */
.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}

th, td {
  padding: 1rem;
  border-bottom: 1px solid #333;
  text-align: left;
  font-size: 0.9rem;
}

th {
  background-color: #2a2a2a;
}

tr:hover {
  background-color: #2f2f2f;
}

/* BUTTON */
.btn {
  background: #d4af37;
  color: #000;
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
  font-size: 0.85rem;
}

.btn:hover {
  background: #f5d76e;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {

  header {
    flex-direction: column;
    align-items: flex-start;
  }

  nav {
    margin-top: 0.5rem;
  }

  nav a {
    margin: 0.4rem 0.8rem 0.4rem 0;
  }

  .dashboard {
    margin: 2rem 1rem;
    padding: 1.5rem;
  }

  .dashboard h2 {
    font-size: 1.3rem;
  }

  table, thead, tbody, th, td, tr {
    display: block;
    width: 100%;
  }

  thead tr {
    display: none; /* hide headers on mobile */
  }

  tr {
    margin-bottom: 1rem;
    background: #2a2a2a;
    border-radius: 10px;
    padding: 0.8rem;
  }

  td {
    padding: 0.5rem;
    text-align: right;
    position: relative;
  }

  td::before {
    content: attr(data-label);
    position: absolute;
    left: 0.8rem;
    width: 50%;
    font-weight: bold;
    text-align: left;
    color: #d4af37;
  }

  .btn {
    width: 100%;
    margin-top: 0.5rem;
    font-size: 0.85rem;
  }
}
</style>
</head>
<body>

<header>
  <h1>PRIMETALENT</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Bookings</a>
    <a href="fan-experiences.html">Fan Exp.</a>
  </nav>
</header>

<div class="dashboard">
  <h2>Booking Dashboard</h2>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Celebrity</th>
          <th>Client</th>
          <th>Date</th>
          <th>Event</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="booking-table-body">
        <!-- JavaScript will populate this -->
      </tbody>
    </table>
  </div>
</div>

<script>
const bookings = [
  { celebrity: "Amara Blaze", client: "Global Music Fest", date: "2026-03-15", event: "Live Performance", status: "Confirmed" },
  { celebrity: "Lara Pulver", client: "BrandX Launch", date: "2026-04-02", event: "Endorsement", status: "Pending" },
  { celebrity: "Rina Gold", client: "Fashion Gala", date: "2026-05-10", event: "Red Carpet Appearance", status: "Pending" }
];

const tableBody = document.getElementById("booking-table-body");

function renderTable() {
  tableBody.innerHTML = "";
  bookings.forEach((booking, index) => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td data-label="Celebrity">${booking.celebrity}</td>
      <td data-label="Client">${booking.client}</td>
      <td data-label="Date">${booking.date}</td>
      <td data-label="Event">${booking.event}</td>
      <td data-label="Status">${booking.status}</td>
      <td data-label="Action">
        ${booking.status === "Pending"
          ? <button class="btn" onclick="approveBooking(${index})">Approve</button>
          : `<button class="btn" onclick="viewBooking(${index})">View</button>`}
      </td>
    `;
    tableBody.appendChild(row);
  });
}

function approveBooking(index) {
  bookings[index].status = "Confirmed";
  renderTable();
  alert(Booking for ${bookings[index].celebrity} has been approved.);
}

function viewBooking(index) {
  const b = bookings[index];
  alert(Booking Details:\n\nCelebrity: ${b.celebrity}\nClient: ${b.client}\nDate: ${b.date}\nEvent: ${b.event}\nStatus: ${b.status});
}

renderTable();
</script>

</body>
</html>
