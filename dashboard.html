  /* PAGE LOADER */

#loader {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: #111211;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 9999;
opacity: 0;
pointer-events: none;
transition: opacity .6s ease;
}

#loader.active {
opacity: 1;
pointer-events: auto;
}

#loader img {
width: 90px;
animation: pulse 1.5s ease-in-out infinite;
}

#loader h2 {
margin-top: 1rem;
color: #d4af37;
font-size: 1.2rem;
opacity: 0;
animation: fadeIn 1.2s forwards;
animation-delay: 0.5s;
}

@keyframes pulse {
0% { transform: scale(1); opacity: 0.8; }
50% { transform: scale(1.1); opacity: 1; }
100% { transform: scale(1); opacity: 0.8; }
}

@keyframes fadeIn {
to { opacity: 1; }
}

/* Header buttons below the title, side by side */
header {
  flex-direction: column; /* stack title and buttons */
  align-items: flex-start;
  gap: 0.8rem; /* space between title and nav */
}

header nav.header-buttons {
  display: flex;
  gap: 1rem; /* space between buttons */
  flex-wrap: wrap;
  margin-top: 0.5rem;
}

/* Keep existing pill-style buttons */
header nav.header-buttons a {
  display: inline-block;
  padding: 0.6rem 1.2rem;
  border-radius: 25px;
  background: #222;
  color: var(--text-color);
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
}

header nav.header-buttons a:hover {
  background: var(--primary-color);
  color: #000;
  transform: scale(1.05);
}

/* Optional: remove floating nav since we no longer need it */
.floating-nav { display: none !important; }
  
</style>

  <script>

const loader = document.getElementById("loader");
const links = document.querySelectorAll("a[href]");

links.forEach(link => {

link.addEventListener("click", function(e){

const target = link.getAttribute("href");

if(target.startsWith("http") || target.startsWith("#")) return;

e.preventDefault();

loader.classList.add("active");

setTimeout(()=>{
window.location.href = target;
},500);

});

});

window.addEventListener("load", () => {
loader.classList.remove("active");
});
